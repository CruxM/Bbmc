<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Torch Macros</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #080808; --surface: #111113; --border: #222226;
      --text: #e0e0e0; --muted: #444; --accent: #ffdd00;
    }
    html, body {
      min-height: 100%; background: var(--bg); color: var(--text);
      font-family: 'DM Mono', monospace;
      display: flex; flex-direction: column;
      align-items: center; justify-content: flex-start;
      overflow-y: auto; padding: 40px 16px 60px;
    }
    #ambientGlow {
      position: fixed; inset: 0; pointer-events: none;
      background: radial-gradient(circle at 50% 30%, rgba(255,220,0,0.2) 0%, transparent 65%);
      opacity: 0; transition: opacity 0.15s; z-index: 0;
    }
    .content { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; width: 100%; }

    .torch-icon {
      font-size: 80px; line-height: 1; margin-bottom: 16px;
      transition: filter 0.1s, transform 0.1s;
    }
    body.lit .torch-icon {
      filter: drop-shadow(0 0 30px #ffdd00) drop-shadow(0 0 60px #ffaa00);
      transform: scale(1.1);
    }
    #modeLabel {
      font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 800;
      letter-spacing: 0.06em; color: #222; margin-bottom: 6px;
      transition: color 0.2s; min-height: 34px;
    }
    body.lit #modeLabel { color: var(--accent); text-shadow: 0 0 20px rgba(255,220,0,0.5); }
    #modeDesc {
      font-size: 11px; color: var(--muted); letter-spacing: 0.12em;
      text-transform: uppercase; margin-bottom: 28px; min-height: 16px;
    }
    body.lit #modeDesc { color: #7a6500; }

    /* ── Real input field — triggers mobile keyboard ── */
    .input-wrap { width: min(360px, 92vw); margin-bottom: 20px; }
    #macroInput {
      width: 100%;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 16px 20px;
      color: var(--accent);
      font-family: 'Syne', sans-serif;
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      outline: none;
      caret-color: var(--accent);
      transition: border-color 0.2s, box-shadow 0.2s;
      /* Keep input clean — single char only visually */
    }
    #macroInput::placeholder {
      color: var(--muted);
      font-size: 12px;
      font-family: 'DM Mono', monospace;
      font-weight: 400;
      letter-spacing: 0.06em;
      text-transform: none;
    }
    #macroInput:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(255,220,0,0.12);
    }

    /* ── Macro rows ── */
    .macros { display: flex; flex-direction: column; gap: 8px; width: min(360px, 92vw); }
    .macro-row {
      display: flex; align-items: center; gap: 10px;
      padding: 11px 14px; border-radius: 10px;
      background: var(--surface); border: 1px solid var(--border);
      transition: border-color 0.2s, background 0.2s; cursor: pointer;
    }
    .macro-row:active { opacity: 0.7; }
    .macro-row.active-mode {
      border-color: var(--accent); background: rgba(255,220,0,0.05);
    }
    .macro-key {
      background: rgba(255,255,255,0.07); border: 1px solid #333;
      border-radius: 6px; padding: 3px 10px; font-size: 13px;
      color: var(--text); font-weight: 500; min-width: 28px; text-align: center;
    }
    .macro-key.enter { background: rgba(255,220,0,0.1); border-color: rgba(255,220,0,0.3); color: var(--accent); }
    .macro-plus { color: var(--muted); font-size: 11px; }
    .macro-desc { font-size: 12px; color: var(--muted); flex: 1; }
    .macro-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #222; transition: background 0.2s, box-shadow 0.2s; flex-shrink: 0;
    }
    .macro-row.active-mode .macro-dot { background: var(--accent); box-shadow: 0 0 6px var(--accent); }

    #statusBar {
      margin-top: 20px; font-size: 11px; letter-spacing: 0.12em;
      text-transform: uppercase; color: #2a2a2a; transition: color 0.3s;
    }
    body.lit #statusBar { color: #5a4a00; }

    /* ── Permission overlay ── */
    #permOverlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.96);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 18px; z-index: 200; padding: 24px;
    }
    .p-icon { font-size: 64px; }
    #permOverlay h2 {
      font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800;
      color: var(--text); text-align: center;
    }
    #permOverlay p { font-size: 13px; color: var(--muted); text-align: center; max-width: 270px; line-height: 1.7; }
    #permOverlay button {
      background: var(--accent); border: none; color: #000;
      border-radius: 10px; padding: 16px 40px;
      font-family: 'Syne', sans-serif; font-weight: 700;
      font-size: 15px; cursor: pointer; letter-spacing: 0.04em;
    }
    #permErr { color: #ff5555; font-size: 12px; display: none; text-align: center; max-width: 270px; line-height: 1.6; }
  </style>
</head>
<body>

<div id="ambientGlow"></div>

<!-- Permission overlay — shown on load -->
<div id="permOverlay">
  <div class="p-icon">🔦</div>
  <h2>Allow Camera Access</h2>
  <p>Camera permission is needed to control the flashlight on your device.</p>
  <button onclick="requestPermission()">Allow &amp; Continue</button>
  <div id="permErr"></div>
</div>

<div class="content">
  <div class="torch-icon">🔦</div>
  <div id="modeLabel">STANDBY</div>
  <div id="modeDesc">Type a key + Enter to activate</div>

  <!-- Real input — mobile keyboard appears when focused -->
  <div class="input-wrap">
    <input
      type="text"
      id="macroInput"
      placeholder="Type A, S, F, O then press Enter…"
      autocomplete="off"
      autocorrect="off"
      autocapitalize="characters"
      spellcheck="false"
      maxlength="1"
    />
  </div>

  <div class="macros">
    <div class="macro-row" id="row-a" onclick="runMacro('a')">
      <span class="macro-key">A</span>
      <span class="macro-plus">+</span>
      <span class="macro-key enter">Enter</span>
      <span class="macro-desc">Heartbeat blink</span>
      <div class="macro-dot"></div>
    </div>
    <div class="macro-row" id="row-s" onclick="runMacro('s')">
      <span class="macro-key">S</span>
      <span class="macro-plus">+</span>
      <span class="macro-key enter">Enter</span>
      <span class="macro-desc">SOS · · · — — — · · ·</span>
      <div class="macro-dot"></div>
    </div>
    <div class="macro-row" id="row-f" onclick="runMacro('f')">
      <span class="macro-key">F</span>
      <span class="macro-plus">+</span>
      <span class="macro-key enter">Enter</span>
      <span class="macro-desc">Fast strobe flash</span>
      <div class="macro-dot"></div>
    </div>
    <div class="macro-row" id="row-o" onclick="runMacro('o')">
      <span class="macro-key">O</span>
      <span class="macro-plus">+</span>
      <span class="macro-key enter">Enter</span>
      <span class="macro-desc">Steady torch ON</span>
      <div class="macro-dot"></div>
    </div>
    <div class="macro-row" id="row-stop" onclick="runMacro('')">
      <span class="macro-key enter">Enter</span>
      <span class="macro-plus" style="visibility:hidden">+</span>
      <span class="macro-key" style="visibility:hidden">·</span>
      <span class="macro-desc">Stop / Turn OFF</span>
      <div class="macro-dot"></div>
    </div>
  </div>

  <div id="statusBar">Waiting…</div>
</div>

<script>
  let torchTrack  = null;
  let blinkTimer  = null;
  let cameraReady = false;

  // ── Auto-request camera on load ───────────────────────────────────
  window.addEventListener('load', () => setTimeout(requestPermission, 300));

  async function requestPermission() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
      torchTrack = stream.getVideoTracks()[0];
      const caps = torchTrack.getCapabilities();
      if (!caps || !caps.torch) {
        showPermErr('Torch not supported on this device. Try Android Chrome.');
        return;
      }
      cameraReady = true;
      document.getElementById('permOverlay').style.display = 'none';
      // Focus input AFTER overlay hides — this pops the keyboard on mobile
      setTimeout(() => document.getElementById('macroInput').focus(), 100);
      setStatus('Ready — type a key + Enter');
    } catch (err) {
      showPermErr(err.name === 'NotAllowedError'
        ? 'Permission denied. Allow camera in browser settings, then reload.'
        : 'Camera error: ' + err.message);
    }
  }

  function showPermErr(msg) {
    const el = document.getElementById('permErr');
    el.textContent = msg; el.style.display = 'block';
  }

  // ── Input: Enter key triggers macro ──────────────────────────────
  document.getElementById('macroInput').addEventListener('keydown', (e) => {
    if (!cameraReady) return;
    if (e.key === 'Enter') {
      e.preventDefault();
      const val = document.getElementById('macroInput').value.trim().toLowerCase();
      runMacro(val);
      document.getElementById('macroInput').value = '';
    }
  });

  // Keep input focused if user taps away
  document.addEventListener('click', (e) => {
    if (!e.target.closest('.macro-row') && cameraReady) {
      setTimeout(() => document.getElementById('macroInput').focus(), 50);
    }
  });

  // ── Macro runner ──────────────────────────────────────────────────
  function runMacro(key) {
    stopAll();
    switch (key) {
      case '':  setMode(null, 'STANDBY', 'Torch off'); break;
      case 'a': startHeartbeat(); break;
      case 's': startSOS();       break;
      case 'f': startStrobe();    break;
      case 'o': startSteady();    break;
      default:  setStatus(`"${key.toUpperCase()}" not mapped — try A, S, F or O`);
    }
    setTimeout(() => document.getElementById('macroInput').focus(), 50);
  }

  // ── HEARTBEAT: lub-dub ────────────────────────────────────────────
  function startHeartbeat() {
    setMode('a', 'HEARTBEAT', 'Lub-dub rhythm');
    const pattern = [80, 100, 80, 700];
    let step = 0; let lit = false;
    async function beat() {
      lit = !lit; await setTorch(lit);
      blinkTimer = setTimeout(beat, pattern[step % pattern.length]); step++;
    }
    beat();
  }

  // ── SOS: · · · — — — · · · ───────────────────────────────────────
  function startSOS() {
    setMode('s', 'SOS', '· · · — — — · · ·');
    const D=120, L=360, SG=120, LG=360, WG=900;
    const seq = [D,SG,D,SG,D,LG, L,SG,L,SG,L,LG, D,SG,D,SG,D,WG];
    let i=0; let lit=false;
    async function next() {
      lit=!lit; await setTorch(lit);
      blinkTimer=setTimeout(next, seq[i%seq.length]); i++;
    }
    next();
  }

  // ── STROBE ────────────────────────────────────────────────────────
  function startStrobe() {
    setMode('f', 'STROBE', 'Rapid flash');
    let lit=false;
    async function flash() {
      lit=!lit; await setTorch(lit);
      blinkTimer=setTimeout(flash, 55);
    }
    flash();
  }

  // ── STEADY ON ─────────────────────────────────────────────────────
  function startSteady() {
    setMode('o', 'STEADY ON', 'Torch on full');
    setTorch(true);
  }

  // ── Core torch ────────────────────────────────────────────────────
  async function setTorch(on) {
    if (!torchTrack) return;
    try { await torchTrack.applyConstraints({ advanced: [{ torch: on }] }); } catch(e){}
    document.body.classList.toggle('lit', on);
    document.getElementById('ambientGlow').style.opacity = on ? '1' : '0';
  }

  function stopAll() {
    if (blinkTimer) { clearTimeout(blinkTimer); blinkTimer=null; }
    setTorch(false);
    document.querySelectorAll('.macro-row').forEach(r => r.classList.remove('active-mode'));
  }

  function setMode(key, label, desc) {
    document.getElementById('modeLabel').textContent = label;
    document.getElementById('modeDesc').textContent  = desc;
    document.querySelectorAll('.macro-row').forEach(r => r.classList.remove('active-mode'));
    const row = document.getElementById(key ? `row-${key}` : 'row-stop');
    if (row) row.classList.add('active-mode');
    setStatus(label === 'STANDBY' ? 'Torch off — ready' : `Active: ${label}`);
  }

  function setStatus(msg) { document.getElementById('statusBar').textContent = msg; }
</script>
</body>
</html>
